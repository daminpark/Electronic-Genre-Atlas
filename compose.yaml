services:
  genre-atlas:
    image: caddy:2-alpine
    container_name: electronic-genre-atlas
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/srv/music.193vbr.com/index.html:ro
      - ./styles.css:/srv/music.193vbr.com/styles.css:ro
      - ./genres-data.js:/srv/music.193vbr.com/genres-data.js:ro
      - ./sync-app.js:/srv/music.193vbr.com/sync-app.js:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
